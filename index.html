<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Biblioteca</title>
  <link rel="manifest" href="manifest.json">
  
  <link rel="stylesheet" href="style.css?v=20">
</head>
<body>

  <div id="aviso-tela" class="aviso oculto"></div>

  <header>
    <div class="header-blur-bg"></div>
    <div class="header-conteudo">
      
      <button class="btn-opcoes-topo" onclick="abrirModalBackup()" title="Backup e Opções">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
      </button>

      <h1>Minha Biblioteca</h1>
      
      <div class="botoes-topo">
        <button class="btn-primario btn-pequeno" onclick="abrirModalAddLivro()">+ Adicionar Livro</button>
        <button class="btn-secundario btn-pequeno" onclick="abrirModalCriarColecao()">+ Nova Coleção</button>
      </div>
    </div>
  </header>

  <main class="estante-container" id="container-estantes"></main>

  <div id="modal-backup" class="modal oculto">
    <div class="modal-conteudo modal-glass modal-pequeno">
      <h2>Opções da Biblioteca</h2>
      <p style="font-size: 12px; color: #aaa; text-align: center; margin-bottom: 20px;">Salve seus livros para não perder ou carregue um backup antigo.</p>
      
      <button class="btn-primario" style="width: 100%; margin-bottom: 10px;" onclick="exportarDados()">⬇️ Salvar Backup no Celular</button>
      <button class="btn-secundario" style="width: 100%; margin-bottom: 20px;" onclick="acionarImportacao()">⬆️ Carregar um Backup</button>
      
      <input type="file" id="fileImportar" style="display: none;" onchange="importarDados(event)">

      <div class="modal-botoes">
        <button class="btn-perigo" style="width: 100%; padding: 12px;" onclick="fecharModal('modal-backup')">Fechar</button>
      </div>
    </div>
  </div>

  <div id="modal-add-livro" class="modal oculto">
    <div class="modal-conteudo modal-glass modal-pequeno">
      <h2>Adicionar Livro</h2>
      
      <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed rgba(255,255,255,0.1);">
        <label style="font-size: 11px; color: #aaa; display: block; margin-bottom: 5px;">Buscar online (Nome do livro ou ISBN)</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="buscaWebInput" placeholder="Ex: Morte no Nilo..." style="margin-bottom: 0;">
          <button class="btn-primario" style="width: auto; padding: 0 15px;" onclick="buscarLivroWeb()">🔍</button>
        </div>
        <div id="resultados-busca" class="resultados-scroll oculto"></div>
      </div>

      <label style="font-size: 11px; color: #aaa; display: block; margin-bottom: 5px;">Ou preencha manualmente:</label>
      <input type="text" id="addTitulo" placeholder="Título do livro...">
      <input type="text" id="addAutor" placeholder="Autor...">
      
      <div class="input-com-icone">
        <input type="text" id="addImagem" placeholder="Link da capa (Opcional)...">
        <button class="btn-icone" title="Carregar do dispositivo" onclick="document.getElementById('fileAddLivro').click()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg>
        </button>
        <input type="file" id="fileAddLivro" accept="image/*" style="display: none;" onchange="processarUploadImagem(event, 'addImagem')">
      </div>
      
      <div class="modal-botoes" style="margin-top: 15px;">
        <button class="btn-primario" onclick="salvarNovoLivro()">Adicionar à Estante</button>
        <button class="btn-secundario" onclick="fecharModal('modal-add-livro')">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="modal-criar-colecao" class="modal oculto">
    <div class="modal-conteudo modal-glass">
      <h2>Nova Coleção</h2>
      <input type="text" id="nomeColecao" placeholder="Nome da Coleção...">
      
      <div class="selecao-livros-glass">
        <p style="margin-top: 0; font-size: 13px; color: #aaa;">Mover livros soltos para cá:</p>
        <div id="lista-livros-soltos"></div>
      </div>

      <div class="modal-botoes">
        <button class="btn-primario" onclick="salvarNovaColecao()">Salvar Coleção</button>
        <button class="btn-secundario" onclick="fecharModal('modal-criar-colecao')">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="modal-editar-colecao" class="modal oculto">
    <div class="modal-conteudo modal-glass">
      <h2>Editar Coleção</h2>
      <input type="text" id="editNomeColecao" placeholder="Nome da Coleção...">
      
      <div class="selecao-livros-glass">
        <p style="margin-top: 0; font-size: 13px; color: #aaa;">Livros nesta coleção:</p>
        <div id="lista-livros-na-colecao"></div>
      </div>

      <div class="selecao-livros-glass">
        <p style="margin-top: 0; font-size: 13px; color: #aaa;">Adicionar mais livros soltos:</p>
        <div id="lista-livros-soltos-editar"></div>
      </div>

      <div class="modal-botoes">
        <button class="btn-primario" onclick="salvarEdicaoColecao()">Atualizar</button>
        <button class="btn-secundario" onclick="fecharModal('modal-editar-colecao')">Fechar</button>
      </div>
      
      <button class="btn-perigo" style="width: 100%; margin-top: 15px; padding: 12px;" onclick="apagarColecao()">🗑️ Apagar Coleção Inteira</button>
    </div>
  </div>

  <div id="modal-status-livro" class="modal oculto">
    <div class="modal-conteudo modal-glass modal-pequeno">
      
      <div class="detalhes-livro-modal">
        <img id="img-status-livro" src="" alt="Capa">
        <h3 id="txt-titulo-livro" style="margin: 10px 0 5px 0; color: #fff; text-align: center;"></h3>
        <p id="txt-autor-livro" style="margin: 0 0 15px 0; color: #aaa; font-size: 12px; text-align: center;"></p>
      </div>

      <button class="btn-primario" style="width: 100%; margin-bottom: 20px; padding: 16px; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;" onclick="abrirTelaAnotacoes()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        Bloco de Notas do Livro
      </button>

      <div class="tags-container" style="margin-bottom: 15px;">
        <label style="font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;">Status de Leitura:</label>
        <select id="select-status-livro" class="select-tecnologico" onchange="atualizarStatusAutomatico()">
          <option value="nao-lido">Não Lido</option>
          <option value="lendo">Em Andamento</option>
          <option value="lido">Já Lido</option>
        </select>
      </div>

      <button class="btn-icone" style="width: 100%; margin-bottom: 15px; border-style: solid; font-size: 12px; border-color: rgba(255,255,255,0.1);" onclick="toggleEdicaoLivro()">⚙️ Opções e Edição do Livro</button>

      <div id="area-edicao-livro" class="oculto" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed rgba(255,255,255,0.1);">
        
        <label style="font-size: 11px; color: #aaa; display: block; margin-bottom: 5px;">Editar Informações:</label>
        <input type="text" id="editTituloLivro" placeholder="Título...">
        <input type="text" id="editAutorLivro" placeholder="Autor...">
        <div class="input-com-icone">
          <input type="text" id="editImagemLivro" placeholder="Link da Capa...">
          <button class="btn-icone" title="Carregar do dispositivo" onclick="document.getElementById('fileEditLivro').click()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg>
          </button>
          <input type="file" id="fileEditLivro" accept="image/*" style="display: none;" onchange="processarUploadImagem(event, 'editImagemLivro', 'img-status-livro')">
        </div>
        <button class="btn-primario" style="margin-bottom: 20px; width: 100%;" onclick="salvarEdicaoBasicaLivro()">Salvar Textos e Capa</button>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">

        <label style="font-size: 11px; color: #ff4d4d; display: block; margin-bottom: 10px;">Ações da Estante:</label>
        <button id="btn-remover-da-colecao" class="btn-secundario" style="width: 100%; margin-bottom: 10px;" onclick="removerLivroDaColecaoPeloLivro()">Sair da Coleção</button>
        <button class="btn-perigo" style="width: 100%; padding: 12px;" onclick="apagarLivro()">🗑️ Apagar Livro da Estante</button>
      </div>

      <div class="modal-botoes">
        <button class="btn-secundario" onclick="fecharModal('modal-status-livro')">Fechar Janela</button>
      </div>

    </div>
  </div>

  <div id="tela-anotacoes" class="tela-secundaria oculto">
    <header class="header-anotacoes">
      <button class="btn-voltar" onclick="fecharTelaAnotacoes()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Voltar
      </button>
      <h2 id="titulo-anotacoes-livro">Nome do Livro</h2>
    </header>
    
    <main class="container-anotacoes">
      <div class="topico-controle">
         <input type="text" id="novoNomeTopico" placeholder="Novo tópico... Ex: Personagens, Pistas, Ideias">
         <button class="btn-primario" style="width: auto; padding: 0 20px; white-space: nowrap;" onclick="criarNovoTopico()">+ Criar</button>
      </div>
      <div id="lista-topicos" class="lista-topicos"></div>
    </main>
  </div>

  <script src="script.js?v=20"></script>
</body>
</html>
